<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHP Decision Maker - Aide à la décision multicritère</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1> AHP Decision Maker</h1>
            <p>Méthode du Processus d'Analyse Hiérarchique (AHP)</p>
        </header>

        <!-- Section 1 : Critères -->
        <section class="card">
            <h2>1. Définir les critères</h2>
            <div class="input-group">
                <input type="text" id="criterionInput" placeholder="Nom du critère (ex: Prix, Qualité, Délai)">
                <button onclick="addCriterion()"> Ajouter</button>
            </div>
            <div id="criteriaList" class="items-list"></div>
            <button onclick="nextToAlternatives()" class="btn-primary" id="nextToAlternativesBtn" disabled>Suivant →</button>
        </section>

        <!-- Section 2 : Alternatives -->
        <section id="alternativesSection" class="card hidden">
            <h2>2. Définir les alternatives</h2>
            <div class="input-group">
                <input type="text" id="alternativeInput" placeholder="Nom de l'alternative (ex: Voiture A, Voiture B)">
                <button onclick="addAlternative()"> Ajouter</button>
            </div>
            <div id="alternativesList" class="items-list"></div>
            <button onclick="nextToScores()" class="btn-primary" id="nextToScoresBtn" disabled>Suivant →</button>
        </section>

        <!-- Section 3 : Scores des alternatives par critère -->
        <section id="scoresSection" class="card hidden">
            <h2>3. Noter les alternatives par critère</h2>
            <div id="scoresMatrix"></div>
            <button onclick="nextToPairwise()" class="btn-primary">Suivant →</button>
        </section>

        <!-- Section 4 : Matrice de comparaison par paires des critères -->
        <section id="pairwiseSection" class="card hidden">
            <h2>4. Comparaison par paires des critères</h2>
            <p class="info">Échelle de Saaty (1 = égal, 3 = modéré, 5 = fort, 7 = très fort, 9 = extrême)</p>
            <div id="pairwiseMatrix"></div>
            <button onclick="calculateAHP()" class="btn-primary"> Calculer la décision</button>
        </section>

        <!-- Section 5 : Résultats -->
        <section id="resultsSection" class="card hidden">
            <h2>5. Résultats</h2>
            <div id="results"></div>
            <button onclick="resetApp()" class="btn-secondary"> Nouvelle analyse</button>
            <button onclick="exportData()" class="btn-secondary">Exporter (JSON)</button>
        </section>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/ahp-calculator.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
